<VirtualHost *:80>
    DocumentRoot /var/www/html/public
    DirectoryIndex index.php

    <Directory /var/www/html/public>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://127.0.0.1:9000"
    </FilesMatch>

    # Security headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
    Header always set Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-XSRF-TOKEN"

    # Gzip compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml
    </IfModule>

    # Timeouts
    ProxyTimeout 300
    Timeout 300

    # Upload limit
    LimitRequestBody 67108864

    # Block dotfiles
    <DirectoryMatch "/\.">
        Require all denied
    </DirectoryMatch>

    # Healthcheck
    Alias /_health.php /var/www/html/_health.php

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>

<VirtualHost *:443>
    DocumentRoot /var/www/html/public
    DirectoryIndex index.php

    SSLEngine on
    SSLCertificateFile    /certs/localhost.pem
    SSLCertificateKeyFile /certs/localhost-key.pem

    <Directory /var/www/html/public>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://127.0.0.1:9000"
    </FilesMatch>

    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=31536000"
    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
    Header always set Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-XSRF-TOKEN"

    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml
    </IfModule>

    ProxyTimeout 300
    Timeout 300
    LimitRequestBody 67108864

    <DirectoryMatch "/\.">
        Require all denied
    </DirectoryMatch>

    Alias /_health.php /var/www/html/_health.php

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
