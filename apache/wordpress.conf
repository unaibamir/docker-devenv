<VirtualHost *:80>
    DocumentRoot /var/www/html
    DirectoryIndex index.php

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Block PHP in uploads
    <Directory /var/www/html/wp-content/uploads>
        <FilesMatch "\.php$">
            Require all denied
        </FilesMatch>
    </Directory>

    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://127.0.0.1:9000"
    </FilesMatch>

    # Security headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Gzip compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml
    </IfModule>

    # Timeouts (match php.ini max_execution_time)
    ProxyTimeout 300
    Timeout 300

    # Upload limit (match php.ini upload_max_filesize)
    LimitRequestBody 67108864

    # Block dotfiles
    <DirectoryMatch "/\.">
        Require all denied
    </DirectoryMatch>

    # Block wp-config.php direct access
    <Files "wp-config.php">
        Require all denied
    </Files>

    # Healthcheck
    Alias /_health.php /var/www/html/_health.php

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
